<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natsuki Sato — Studio (concept D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ▼ フォントはここを差し替えるだけで全体に効きます */
    --font:'Space Grotesk',system-ui,"Hiragino Kaku Gothic ProN",sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
    --bg:#0d0e12; --ink:#f2f3f7; --sub:#8b90a2;
    --accent:#ff6a3d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:var(--font)}
  canvas{display:block;touch-action:none}

  .ui{position:fixed;inset:0;pointer-events:none;z-index:5}
  .top{position:absolute;top:30px;left:36px}
  .kick{font-family:var(--mono);font-size:.7rem;letter-spacing:.4em;color:var(--accent);text-transform:uppercase}
  .name{font-size:clamp(1.7rem,4.6vw,3rem);font-weight:700;letter-spacing:-.015em;margin-top:.45rem;line-height:1}
  .name small{display:block;font-size:.32em;font-weight:400;color:var(--sub);letter-spacing:.06em;margin-top:.55em}
  .tag{position:absolute;left:36px;bottom:30px;max-width:34ch;font-size:.82rem;color:var(--sub);line-height:1.85}
  .tag b{color:var(--ink);font-weight:500}

  #panel{position:fixed;right:36px;top:50%;transform:translateY(-50%) translateX(20px);z-index:7;width:280px;
         opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
  #panel.on{opacity:1;transform:translateY(-50%) translateX(0)}
  #panel .idx{font-family:var(--mono);font-size:.66rem;color:var(--accent);letter-spacing:.2em}
  #panel h3{font-size:1.5rem;font-weight:700;margin:.3rem 0 .7rem;line-height:1.1}
  #panel p{font-size:.84rem;color:var(--sub);line-height:1.75}
  #panel .tags{font-family:var(--mono);font-size:.66rem;color:var(--accent);margin-top:.9rem;letter-spacing:.03em}
  #panel .div{height:1px;background:rgba(255,255,255,.1);margin:1rem 0}

  #tip{position:fixed;z-index:8;pointer-events:none;font-family:var(--mono);font-size:.68rem;color:var(--ink);
       background:rgba(13,14,18,.8);border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:.3rem .55rem;
       opacity:0;transition:opacity .15s;backdrop-filter:blur(4px)}
  #tip.on{opacity:1}

  .help{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:6;font-family:var(--mono);
        font-size:.64rem;color:var(--sub);text-align:center;line-height:1.7}
  .help b{color:var(--ink)}
  .loading{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:var(--bg);
           font-family:var(--mono);font-size:.8rem;color:var(--sub);letter-spacing:.2em;transition:opacity .6s}
  .loading.off{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="loading" id="loading">LOADING STUDIO… <span style="opacity:.5">build D-2</span></div>
<script>
  // 失敗を黙らせない：エラーは画面に出す（真っ暗で詰まらないように）
  function showFail(msg){
    var l=document.getElementById('loading');
    if(l){l.innerHTML='⚠ STUDIO 起動失敗<br><span style="font-size:.7em;opacity:.7">'+String(msg).slice(0,180)+'</span><br><span style="font-size:.7em;opacity:.5">WebGL か module 読み込みの可能性。これを撮って送ってください</span>';l.classList.remove('off');}
  }
  window.addEventListener('error',e=>showFail(e.message||'script error'));
  window.addEventListener('unhandledrejection',e=>showFail((e.reason&&e.reason.message)||'load rejected'));
</script>

<div class="ui">
  <div class="top">
    <div class="kick">Interaction · Modeling · Design</div>
    <div class="name">Natsuki&nbsp;Sato<small>佐藤 夏樹 — 触れて、回して、放れる作品空間</small></div>
  </div>
  <div class="tag">作品は<b>物体</b>です。<br>掴んで回す・放る・引き寄せる。<br>操作そのものが、つくり手の証明。</div>
</div>

<div id="panel"></div>
<div id="tip"></div>
<div class="help"><b>drag empty space</b> orbit · <b>scroll</b> zoom · <b>grab an object</b> spin & toss · <b>click</b> focus</div>

<script type="importmap">
{ "imports": {
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {RoundedBoxGeometry} from 'three/addons/geometries/RoundedBoxGeometry.js';

const WORKS=[
  {sym:"Kb",name:"周期表キーボード",cat:"hw",geo:"box",desc:"元素周期表レイアウトの自作キーボード。PCB設計からTHT手はんだまで一貫制作。",tags:"KiCad / PCB / Hardware"},
  {sym:"Bm",name:"BMO-Chan",cat:"robo",geo:"box",desc:"BMOを宿す自作スタックチャン。表情と首振りを制御する卓上の相棒。",tags:"M5Stack / Robotics"},
  {sym:"Sc",name:"スクリーンセーバ",cat:"sw",geo:"ico",desc:"放置でスタックちゃんの顔が現れるMac用アプリ。",tags:"Electron / Canvas"},
  {sym:"U", name:"単位キーホルダー",cat:"prod",geo:"torus",desc:"単位記号の文字の形をかたどった3Dプリント製キーホルダー。",tags:"3DP / Product"},
  {sym:"Tb",name:"3Tabs",cat:"sw",geo:"ico",desc:"タブ数を3つに制限するミニマリスト向けChrome拡張。7言語対応。",tags:"Chrome Ext / JS"},
  {sym:"Yt",name:"YouTube Feed Filter",cat:"sw",geo:"ico",desc:"フィードを見たい動画だけに絞るChrome拡張。",tags:"Chrome Ext / JS"},
  {sym:"Nc",name:"名刺ジェネレーター",cat:"design",geo:"box",desc:"ブラウザ上で名刺をフルカスタムできるWebアプリ。",tags:"Web App / Design"},
  {sym:"Id",name:"アイデアルーレット",cat:"design",geo:"cyl",desc:"2語を掛け合わせ発想の種を出す支援アプリ。",tags:"Web App / Ideation"},
  {sym:"Cs",name:"Circular Scheduler",cat:"design",geo:"torus",desc:"円形時計UIで一日のタスクを可視化。Google Tasks連携。",tags:"Web App / UI"},
  {sym:"Pc",name:"PCCam",cat:"sw",geo:"cyl",desc:"PCカメラで撮ってその場で加工できるエディタ。",tags:"Web App / Camera"},
  {sym:"Sv",name:"SVGメーカー",cat:"sw",geo:"oct",desc:"画像を2値化してベクタ化するツール。",tags:"Web App / SVG"},
  {sym:"3D",name:"3Dプリント製品開発",cat:"prod",geo:"box",desc:"CAD設計から量産まで一貫した自作プロダクト。",tags:"CAD / 3DP / Modeling"},
  {sym:"Ms",name:"ものづくりの土台",cat:"prod",geo:"oct",desc:"材料・計測のバックグラウンドを、HCI・デザイン・モデリングの精度に転用。",tags:"Foundation"},
];
const COL={hw:0xff6a3d,sw:0x46d4c8,robo:0xc792ea,design:0xffce5c,prod:0xa0e060};

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0d0e12,0.035);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1,13);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xbcd0ff,0x202024,0.9));
const key=new THREE.DirectionalLight(0xffffff,1.4); key.position.set(5,8,6); scene.add(key);
const rim=new THREE.DirectionalLight(0xff7a4d,0.6); rim.position.set(-6,-2,-4); scene.add(rim);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.enablePan=false; controls.minDistance=6; controls.maxDistance=20;
controls.autoRotate=true; controls.autoRotateSpeed=0.5;

// ▼ 各作品を立体に
function makeGeo(kind){
  switch(kind){
    case "box":  return new RoundedBoxGeometry(1.7,1.7,1.7,6,0.28);
    case "ico":  return new THREE.IcosahedronGeometry(1.15,0);
    case "oct":  return new THREE.OctahedronGeometry(1.25,0);
    case "torus":return new THREE.TorusGeometry(0.95,0.4,24,48);
    case "cyl":  return new THREE.CylinderGeometry(1,1,1.5,40);
    default:     return new THREE.SphereGeometry(1.1,32,32);
  }
}
function labelTex(sym,hex){
  const c=document.createElement('canvas'); c.width=c.height=256;
  const x=c.getContext('2d');
  x.fillStyle='#0d0e12'; x.fillRect(0,0,256,256);
  x.fillStyle='#'+hex.toString(16).padStart(6,'0');
  x.font='700 110px "Space Grotesk",sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(sym,128,138);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}

const objs=[]; const group=new THREE.Group(); scene.add(group);
const N=WORKS.length, R=6.2;
WORKS.forEach((w,i)=>{
  const hex=COL[w.cat];
  const mat=new THREE.MeshStandardMaterial({color:hex,roughness:0.45,metalness:0.15,
            emissive:hex,emissiveIntensity:0.05,emissiveMap:labelTex(w.sym,0xffffff)});
  const mesh=new THREE.Mesh(makeGeo(w.geo),mat);
  // フィボナッチ球面で均等配置
  const phi=Math.acos(1-2*(i+0.5)/N), theta=Math.PI*(1+Math.sqrt(5))*i;
  const home=new THREE.Vector3(
    R*Math.cos(theta)*Math.sin(phi), R*Math.cos(phi)*0.7, R*Math.sin(theta)*Math.sin(phi));
  mesh.position.copy(home);
  mesh.userData={w,home,vel:new THREE.Vector3(),av:new THREE.Vector3(),phase:Math.random()*6.28};
  group.add(mesh); objs.push(mesh);
});

// ▼ インタラクション：掴む / 回す / 放る / フォーカス
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();
const plane=new THREE.Plane(), planePt=new THREE.Vector3(), offset=new THREE.Vector3();
let hovered=null, dragged=null, focused=null, downXY=null, prevPt=new THREE.Vector3(), moved=0;
const tip=document.getElementById('tip'), panel=document.getElementById('panel');

function setPtr(e){ptr.x=(e.clientX/innerWidth)*2-1; ptr.y=-(e.clientY/innerHeight)*2+1;}
function pick(){ray.setFromCamera(ptr,camera); return ray.intersectObjects(objs,false)[0];}

renderer.domElement.addEventListener('pointermove',e=>{
  setPtr(e);
  if(dragged){
    moved+=Math.abs(e.movementX)+Math.abs(e.movementY);
    ray.setFromCamera(ptr,camera);
    if(ray.ray.intersectPlane(plane,planePt)){
      const np=planePt.clone().add(offset);
      const d=np.clone().sub(dragged.position);
      dragged.userData.vel.copy(d);                // 放る速度
      dragged.userData.av.set(-d.y*0.25,d.x*0.25,0); // 回す角速度
      dragged.position.copy(np);
    }
    return;
  }
  const hit=pick();
  if(hit){
    if(hovered!==hit.object){hovered=hit.object;}
    document.body.style.cursor='grab';
    tip.textContent=hovered.userData.w.name; tip.classList.add('on');
    tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY+16)+'px';
  }else{hovered=null;document.body.style.cursor='default';tip.classList.remove('on');}
});

renderer.domElement.addEventListener('pointerdown',e=>{
  setPtr(e); const hit=pick();
  if(hit){
    dragged=hit.object; moved=0; downXY=[e.clientX,e.clientY];
    controls.enabled=false; document.body.style.cursor='grabbing';
    plane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).negate(),dragged.position);
    ray.setFromCamera(ptr,camera);
    if(ray.ray.intersectPlane(plane,planePt)) offset.copy(dragged.position).sub(planePt);
    dragged.userData.vel.set(0,0,0);
  }
});

addEventListener('pointerup',e=>{
  if(dragged){
    if(moved<6){ focus(dragged); }       // ほぼ動いてない＝クリック→フォーカス
    controls.enabled=true; document.body.style.cursor=hovered?'grab':'default';
    dragged=null;
  }
});

function focus(obj){
  focused=obj; const w=obj.userData.w, hex='#'+COL[w.cat].toString(16).padStart(6,'0');
  panel.innerHTML=`<div class="idx" style="color:${hex}">${w.sym} · ${w.cat.toUpperCase()}</div>
    <h3>${w.name}</h3><div class="div"></div><p>${w.desc}</p>
    <div class="tags" style="color:${hex}">${w.tags}</div>`;
  panel.classList.add('on');
  controls.autoRotate=false;
}
renderer.domElement.addEventListener('dblclick',()=>{panel.classList.remove('on');focused=null;controls.autoRotate=true;});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

const clock=new THREE.Clock();
function tick(){
  const t=clock.getElapsedTime();
  for(const o of objs){
    const u=o.userData;
    if(o!==dragged){
      // ホームへ緩く戻る + 慣性 + アイドルの浮遊
      const pull=u.home.clone().sub(o.position).multiplyScalar(0.012);
      u.vel.add(pull); u.vel.multiplyScalar(0.93); o.position.add(u.vel);
      o.position.y+=Math.sin(t*0.6+u.phase)*0.0016;
      o.rotation.x+=u.av.x+0.001; o.rotation.y+=u.av.y+0.0014; o.rotation.z+=u.av.z;
      u.av.multiplyScalar(0.96);
      const target=(o===hovered||o===focused)?0.28:0.05;
      o.material.emissiveIntensity+=(target-o.material.emissiveIntensity)*0.1;
      const s=(o===focused)?1.18:1; o.scale.lerp(new THREE.Vector3(s,s,s),0.1);
    }else{
      o.rotation.x+=u.av.x; o.rotation.y+=u.av.y;
    }
  }
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();
document.getElementById('loading').classList.add('off');
</script>
</body>
</html>
